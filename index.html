<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIE | Maturity Bento</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Modern Header -->
        <header class="app-header">
            <div class="logo-section">
                <div class="logo-icon-box"><i data-lucide="brain"></i></div>
                <h1>MIE</h1>
            </div>
            <div class="header-controls">
                <input type="password" id="claude-api-key" class="key-input" placeholder="Claude API Key">
            </div>
        </header>

        <main class="app-main">
            <!-- Bento Intake Hub -->
            <section id="hero-hub" class="intake-grid">
                <div class="bento-card dark">
                    <div class="icon-chip"><i data-lucide="upload-cloud"></i></div>
                    <h2 class="card-title">Analysis Intake</h2>
                    <p style="opacity:0.6; font-size:14px; margin-bottom: 24px;">Upload corporate documentation to begin maturity mapping.</p>
                    
                    <div class="drop-zone" id="drop-zone">
                        <i data-lucide="file-text" style="opacity:0.5; margin-bottom:16px;"></i>
                        <p style="font-size:14px; font-weight:600;">Click to browse reports</p>
                        <input type="file" id="file-input" style="position:absolute; opacity:0; width:100%; height:100%; top:0; left:0; cursor:pointer">
                    </div>
                    
                    <button id="analyze-btn" class="primary-pill-btn" style="background:var(--lvl-5); color:black; margin-top:32px; width:100%;" disabled>
                        Begin Engine
                        <i data-lucide="play-circle"></i>
                    </button>
                </div>

                <div class="bento-card">
                    <div class="icon-chip neon"><i data-lucide="settings-2"></i></div>
                    <h2 class="card-title">Dimension Focus</h2>
                    <p style="color:var(--text-muted); font-size:14px; margin-bottom:32px;">Configure the 7 core maturity pillars for deep analysis.</p>
                    
                    <div class="dimensions-selector" id="dimensions-list">
                        <!-- Populated via JS as Pills -->
                    </div>
                    
                    <div style="margin-top: 40px; border-top: 1px solid rgba(0,0,0,0.05); padding-top: 24px; display: flex; justify-content: space-between; align-items: center;">
                        <span style="font-size:13px; font-weight:700;">Engine Mode:</span>
                        <div class="dim-pill" style="background:black; color:white;">AI Intelligent Mode</div>
                    </div>
                </div>
            </section>

            <!-- Loading State -->
            <section id="loading-state" class="hidden" style="text-align: center; padding: 100px 0;">
                <div class="icon-chip neon" style="width: 80px; height: 80px; margin: 0 auto 32px;"><i data-lucide="cpu" style="width:32px; height:32px;"></i></div>
                <h2 id="loading-message">Initializing AI Processor...</h2>
                <div style="font-size: 48px; font-weight: 700; margin-top: 16px;" id="loading-percent">...</div>
            </section>

            <!-- Results Matrix -->
            <section id="results-dashboard" class="hidden">
                <div class="results-matrix" id="dimensions-results">
                    <!-- Bento Maturity Cards populated via JS -->
                </div>
                
                <div style="margin-top: 60px; display: flex; justify-content: space-between; align-items: center; background: white; padding: 24px 40px; border-radius: 30px; box-shadow: var(--shadow-soft);">
                    <div>
                        <h4 style="font-size:14px; opacity:0.5;">Analysis Complete</h4>
                        <h2 style="font-size:24px;">7 Pillars Mapped</h2>
                    </div>
                    <div style="display: flex; gap: 12px;">
                        <button id="export-json" class="dim-pill">Download JSON</button>
                        <button id="export-csv" class="dim-pill">Download CSV</button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Unified App Logic -->
    <script src="js/app.js?v=6"></script>
</body>
</html>
